<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portfolio Architekta</title>

<style>
:root{
  --bg:#f5f5f5; --text:#222; --accent:#6b6b6b;
  --card:#ffffff; --border:#e2e2e2;
}
body.dark{
  --bg:#121212; --text:#eaeaea; --accent:#aaaaaa;
  --card:#1e1e1e; --border:#2c2c2c;
}
*{box-sizing:border-box;margin:0;padding:0}

body{
  font-family:"Helvetica Neue", Arial, sans-serif;
  background:var(--bg);
  color:var(--text);
  transition:.3s;
}

.container{max-width:1200px;margin:0 auto;padding:0 20px;}

header{
  padding:25px 0;
  border-bottom:1px solid var(--border);
  background:var(--card);
}

.header-inner{display:flex;justify-content:space-between;align-items:center;}
.logo{font-weight:600;letter-spacing:2px;}

.controls{display:flex;align-items:center;gap:15px;}

nav a{text-decoration:none;color:var(--text);margin-left:20px;}

.bubble{
  display:flex;
  align-items:center;
  padding:6px 14px;
  border-radius:20px;
  border:1px solid var(--border);
  background:var(--card);
  cursor:pointer;
  transition:.3s;
  font-size:14px;
}

.bubble:hover{background:var(--accent);color:#fff;}

.toggle{position:relative;display:flex;width:80px;}
.toggle span{flex:1;text-align:center;padding:6px 0;opacity:.5;cursor:pointer;}
.toggle span.active{opacity:1;}

.toggle::before{
  content:"";
  position:absolute;
  width:50%;
  height:100%;
  background:var(--bg);
  border-radius:20px;
  transition:.3s;
}
.toggle.right::before{left:50%;}

.hero{text-align:center;margin-top:40px;}
.hero h1{font-size:36px;margin-bottom:15px;}
.hero p{max-width:700px;margin:auto;color:var(--accent);line-height:1.8;margin-bottom:30px;}

.projects-title{text-align:center;font-size:28px;margin:20px 0 25px;}

#portfolio{
  position:relative;
  padding:0 50px;
  display:flex;
  flex-direction:column;
  align-items:center;
}

.slider-window{overflow:hidden;width:940px;}
.projects-wrapper{display:flex;gap:35px;transition:.5s;}

.project{
  min-width:280px;
  background:var(--card);
  border:1px solid var(--border);
  border-radius:12px;
  overflow:hidden;
  transition:.3s;
}
.project:hover{transform:scale(1.05);}

.project img{width:100%;height:180px;object-fit:cover;}

.project-content{
  padding:15px;
  text-align:center;
  color:var(--accent);
}

.arrow{
  position:absolute;
  top:50%;
  transform:translateY(-50%);
  background:var(--card);
  border:1px solid var(--border);
  border-radius:50%;
  font-size:24px;
  padding:10px;
  cursor:pointer;
}
.arrow.left{left:-30px;}
.arrow.right{right:-30px;}

.about{
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  text-align:center;
  gap:40px;
  margin-top:60px;
}

.about img{
  max-width:250px;
  border-radius:12px;
}

.about-text{
  max-width:700px;
  color:var(--accent);
}

/* 🔥 GALERIA */
.gallery{
  margin-top:60px;
  text-align:center;
  padding:20px 0;
  transition:0.4s ease;
}

/* 🔥 więcej przestrzeni po rozwinięciu */
.gallery.expanded{
  padding:70px 0;
}

.gallery-row,
.gallery-expanded{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:20px; /* NIE ZMIENIAMY */
}

.gallery-expanded{
  opacity:0;
  display:none;
  transition:0.5s;
}

.gallery-expanded.show{
  display:grid;
  opacity:1;
}

.gallery-img{
  width:100%;
  aspect-ratio:1;
  object-fit:cover;
  border-radius:12px;
  cursor:pointer;
  transition:0.3s;
}

.gallery-img:hover{transform:scale(1.05);}

/* 🔥 przycisk niżej */
#showMoreBtn, #showLessBtn{
  margin-top:40px;
}

.contact{text-align:center;margin-top:50px;}
footer{text-align:center;margin-top:40px;color:var(--accent);}

/* lightbox */
#lightbox{
  display:none;
  position:fixed;
  top:0;left:0;
  width:100%;height:100%;
  background:rgba(0,0,0,0.85);
  justify-content:center;
  align-items:center;
}

#lightbox img{
  max-width:90%;
  max-height:90%;
}

</style>
</head>

<body>

<div class="container">

<section class="gallery" id="gallery">

<h2>Galeria</h2>

<div class="gallery-row">
<img src="https://images.pexels.com/photos/3807692/pexels-photo-3807692.jpeg" class="gallery-img">
<img src="https://images.pexels.com/photos/323705/pexels-photo-323705.jpeg" class="gallery-img">
<img src="https://images.pexels.com/photos/417173/pexels-photo-417173.jpeg" class="gallery-img">
<img src="https://images.pexels.com/photos/373912/pexels-photo-373912.jpeg" class="gallery-img">
</div>

<div class="gallery-expanded" id="galleryExpanded">
<img src="https://images.pexels.com/photos/374710/pexels-photo-374710.jpeg" class="gallery-img">
<img src="https://images.pexels.com/photos/323780/pexels-photo-323780.jpeg" class="gallery-img">
<img src="https://images.pexels.com/photos/416405/pexels-photo-416405.jpeg" class="gallery-img">
<img src="https://images.pexels.com/photos/164634/pexels-photo-164634.jpeg" class="gallery-img">
</div>

<div id="showMoreBtn" class="bubble">Zobacz więcej</div>
<div id="showLessBtn" class="bubble" style="display:none;">Pokaż mniej</div>

</section>

</div>

<div id="lightbox"><img src=""></div>

<script>
const showMoreBtn=document.getElementById('showMoreBtn');
const showLessBtn=document.getElementById('showLessBtn');
const galleryExpanded=document.getElementById('galleryExpanded');
const gallery=document.getElementById('gallery');

showMoreBtn.onclick=()=>{
  galleryExpanded.style.display='grid';
  setTimeout(()=>galleryExpanded.classList.add('show'),10);

  gallery.classList.add('expanded'); // 🔥 więcej przestrzeni

  showMoreBtn.style.display='none';
  showLessBtn.style.display='inline-block';
};

showLessBtn.onclick=()=>{
  galleryExpanded.classList.remove('show');
  setTimeout(()=>galleryExpanded.style.display='none',500);

  gallery.classList.remove('expanded');

  showMoreBtn.style.display='inline-block';
  showLessBtn.style.display='none';
};

// lightbox
document.querySelectorAll('.gallery-img').forEach(img=>{
  img.onclick=()=>{
    lightbox.style.display='flex';
    lightbox.querySelector('img').src=img.src;
  }
});

lightbox.onclick=()=>lightbox.style.display='none';
</script>

</body>
</html>
