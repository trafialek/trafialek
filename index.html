<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portfolio Architekta</title>
<style>
:root{
  --bg:#f5f5f5; --text:#222; --accent:#6b6b6b;
  --card:#ffffff; --border:#e2e2e2;
}
body.dark{
  --bg:#121212; --text:#eaeaea; --accent:#aaaaaa;
  --card:#1e1e1e; --border:#2c2c2c;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:"Helvetica Neue", Arial, sans-serif; background:var(--bg); color:var(--text); transition:.3s;}
.container{max-width:1200px;margin:0 auto;padding:0 20px;}
header{padding:25px 0;border-bottom:1px solid var(--border);background:var(--card);}
.header-inner{display:flex;justify-content:space-between;align-items:center;}
.logo{font-weight:600;letter-spacing:2px;}
.controls{display:flex;align-items:center;gap:15px;}
nav a{text-decoration:none;color:var(--text);margin-left:20px;}
.bubble{display:flex;align-items:center;padding:6px 14px;border-radius:20px;border:1px solid var(--border);background:var(--card);cursor:pointer;transition:.3s;font-size:14px;color:var(--text);}
.bubble:hover{background:var(--accent);color:#fff;}
.toggle{position:relative;display:flex;width:80px;}
.toggle span{flex:1;text-align:center;padding:6px 0;z-index:2;cursor:pointer;opacity:.5;transition:.3s;font-size:12px;}
.toggle span.active{opacity:1;}
.toggle::before{content:"";position:absolute;width:50%;height:100%;background:var(--bg);border-radius:20px;transition:.3s;}
.toggle.right::before{left:50%;}
.hero{text-align:center;margin-top:40px;}
.hero h1{font-size:36px;margin-bottom:15px;}
.hero p{max-width:700px;margin:auto;color:var(--accent);line-height:1.8;margin-bottom:30px;}
.projects-title{text-align:center;font-size:28px;font-weight:600;margin:20px 0 25px;color:var(--text);}
#portfolio{position:relative;padding:0 50px;display:flex;flex-direction:column;align-items:center;}
.slider-window{overflow:hidden;width:940px;}
.projects-wrapper{display:flex;gap:35px;transition: transform 0.5s ease;}
.project{min-width:280px;max-width:280px;background:var(--card);border:1px solid var(--border);border-radius:12px;overflow:hidden;transition:transform .3s;}
.project img{width:100%;height:180px;object-fit:cover;}
.project-content{padding:15px;text-align:center;color:var(--accent);}
.project:hover{transform:scale(1.05);}
.arrow{position:absolute;top:50%;transform:translateY(-50%);background:var(--card);border:1px solid var(--border);border-radius:50%;font-size:24px;padding:10px;cursor:pointer;z-index:10;}
.arrow:hover{background:var(--accent);color:#fff;}
.arrow.left{left:-30px;} .arrow.right{right:-30px;}
.about{display:flex;flex-wrap:wrap;justify-content:center;align-items:flex-start;text-align:center;gap:40px;margin-top:60px;}
.about img{max-width:250px;width:100%;border-radius:12px;border:1px solid var(--border);}
.about-text{max-width:700px;color:var(--accent);line-height:1.8;text-align:center;font-size:16px;margin-bottom:40px;}
.gallery{margin-top:60px;text-align:center;}
.gallery-title{font-size:28px;font-weight:600;margin-bottom:25px;color:var(--text);}
.gallery-row, .gallery-expanded{display:grid;gap:20px; grid-template-columns:repeat(4,1fr);}

/* 🔥 POPRAWKA */
.gallery-expanded{
  opacity:0;
  transition:opacity 0.5s ease;
  display:none;
  margin-top:20px;
}

.gallery-expanded.show{display:grid;opacity:1;}

.gallery-img{width:100%;aspect-ratio:1;object-fit:cover;border-radius:12px;cursor:pointer;transition:0.3s;}
.gallery-img:hover{transform:scale(1.05);}
#showMoreBtn, #showLessBtn{margin:20px auto 0 auto;font-size:14px;display:inline-block;cursor:pointer;}
#showMoreBtn.bubble, #showLessBtn.bubble{padding:6px 14px;border-radius:20px;border:1px solid var(--border);background:var(--card);}
.contact{text-align:center;margin-top:50px;}
.contact p{color:var(--accent);line-height:1.6;}
footer{text-align:center;padding:40px 0;color:var(--accent);border-top:1px solid var(--border);margin-top:40px;}
#lightbox{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.85);justify-content:center;align-items:center;z-index:1000;}
#lightbox img{max-width:90%;max-height:90%;border-radius:12px;}
#lightbox span{position:absolute;top:20px;right:30px;font-size:40px;color:#fff;cursor:pointer;}
@media(max-width:900px){.gallery-row,.gallery-expanded{grid-template-columns:repeat(2,1fr);}}
@media(max-width:600px){.hero h1{font-size:26px;} nav a{margin-left:10px;font-size:13px;}}
</style>
</head>

<body>

</html>
